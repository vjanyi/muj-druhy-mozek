<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Brain circle with neural network pattern -->
  <circle cx="256" cy="256" r="180" fill="#f4a261"/>
  
  <!-- Neural connections (simplified brain representation) -->
  <g stroke="#000000" stroke-width="3" fill="none" opacity="0.3">
    <!-- Left hemisphere connections -->
    <path d="M 180 200 Q 200 220, 180 240"/>
    <path d="M 160 240 Q 180 260, 160 280"/>
    <path d="M 180 280 Q 200 300, 180 320"/>
    
    <!-- Right hemisphere connections -->
    <path d="M 332 200 Q 312 220, 332 240"/>
    <path d="M 352 240 Q 332 260, 352 280"/>
    <path d="M 332 280 Q 312 300, 332 320"/>
    
    <!-- Central connections -->
    <path d="M 230 180 Q 256 200, 282 180"/>
    <path d="M 230 330 Q 256 310, 282 330"/>
  </g>
  
  <!-- Neural nodes -->
  <g fill="#000000" opacity="0.4">
    <circle cx="180" cy="200" r="6"/>
    <circle cx="180" cy="240" r="6"/>
    <circle cx="160" cy="240" r="6"/>
    <circle cx="160" cy="280" r="6"/>
    <circle cx="180" cy="320" r="6"/>
    
    <circle cx="332" cy="200" r="6"/>
    <circle cx="332" cy="240" r="6"/>
    <circle cx="352" cy="240" r="6"/>
    <circle cx="352" cy="280" r="6"/>
    <circle cx="332" cy="320" r="6"/>
    
    <circle cx="230" cy="180" r="6"/>
    <circle cx="282" cy="180" r="6"/>
    <circle cx="256" cy="256" r="8"/>
    <circle cx="230" cy="330" r="6"/>
    <circle cx="282" cy="330" r="6"/>
  </g>
</svg>
